<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | TaskMaster Admin</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .admin-card { background: white; border-radius: 2rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; }
        .status-badge { padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .pending { background: #fef9c3; color: #854d0e; }
        .approved { background: #dcfce7; color: #166534; }
        .rejected { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-slate-900 text-white p-6 rounded-b-[3rem] shadow-xl mb-6">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <div>
                <h1 class="text-xl font-extrabold tracking-tight">Admin Master</h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Control de Depósitos</p>
            </div>
            <div class="bg-slate-800 p-3 rounded-2xl">
                <i class="fas fa-shield-alt text-blue-400"></i>
            </div>
        </div>
    </header>

    <main class="p-4 max-w-4xl mx-auto">
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="admin-card p-5 text-center">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Pendientes</p>
                <p id="count-pending" class="text-2xl font-black text-blue-600">0</p>
            </div>
            <div class="admin-card p-5 text-center">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Total Aprobado</p>
                <p id="count-total" class="text-2xl font-black text-green-600">$0</p>
            </div>
        </div>

        <h2 class="text-lg font-extrabold text-slate-800 mb-4 px-2">Solicitudes Recientes</h2>
        
        <div id="lista-deposits" class="space-y-4">
            <div class="text-center py-10">
                <i class="fas fa-circle-notch fa-spin text-3xl text-blue-500 mb-3"></i>
                <p class="text-slate-500 font-bold text-sm">Buscando solicitudes en Firebase...</p>
            </div>
        </div>

    </main>

    <script>
        // CONFIGURACIÓN FIREBASE (Mantén la tuya)
        const firebaseConfig = {
            apiKey: "AIzaSyAl8xcRhkgE3lI05ShqQRMH0fxx7eNJMEk",
            authDomain: "tasks-app-80289.firebaseapp.com",
            projectId: "tasks-app-80289",
            storageBucket: "tasks-app-80289.firebasestorage.app",
            messagingSenderId: "135500027421",
            appId: "1:135500027421:web:8ccb011b5af1f483df58f4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. FUNCIÓN PARA CARGAR DEPÓSITOS
        function escucharDepositos() {
            const contenedor = document.getElementById('lista-deposits');
            const cPendientes = document.getElementById('count-pending');
            const cTotal = document.getElementById('count-total');

            // Escuchamos la colección "deposits" en tiempo real
            db.collection("deposits").orderBy("timestamp", "desc").onSnapshot(snapshot => {
                let html = "";
                let pendientes = 0;
                let totalAprobado = 0;

                if (snapshot.empty) {
                    contenedor.innerHTML = `
                        <div class="text-center py-10 bg-white rounded-[2.5rem] border-2 border-dashed border-slate-200">
                            <p class="text-slate-400 font-bold">No hay registros de depósitos.</p>
                        </div>`;
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const id = doc.id;

                    // Sumar estadísticas
                    if (data.status === "pending" || data.status === "En revisión") pendientes++;
                    if (data.status === "approved") totalAprobado += data.amount;

                    // Mostrar solo los que NO han sido finalizados o mostrar todos con controles
                    // En este caso, mostraremos los PENDIENTES arriba con botones
                    if (data.status === "pending" || data.status === "En revisión") {
                        html += `
                        <div class="admin-card p-6 border-l-8 border-yellow-400">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <span class="status-badge pending">${data.status}</span>
                                    <h3 class="text-xl font-black text-slate-800 mt-2">$${data.amount} MXN</h3>
                                    <p class="text-[10px] text-slate-400 font-bold">ID USUARIO: ${data.uid.substring(0,10)}...</p>
                                </div>
                                <div class="text-right text-[10px] font-bold text-slate-400 italic">
                                    ${data.timestamp ? new Date(data.timestamp.toDate()).toLocaleString() : 'Recién enviado'}
                                </div>
                            </div>

                            <div class="mb-4">
                                <p class="text-[9px] font-black text-slate-400 uppercase mb-2">Comprobante (ImgBB)</p>
                                <a href="${data.evidence}" target="_blank">
                                    <img src="${data.evidence}" class="w-full h-48 object-cover rounded-2xl border border-slate-200 hover:opacity-90 transition">
                                </a>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="gestionarPago('${id}', 'approved')" class="bg-green-600 text-white py-4 rounded-2xl text-[11px] font-black uppercase tracking-widest shadow-lg shadow-green-200">
                                    <i class="fas fa-check mr-2"></i> Aprobar
                                </button>
                                <button onclick="gestionarPago('${id}', 'rejected')" class="bg-red-600 text-white py-4 rounded-2xl text-[11px] font-black uppercase tracking-widest shadow-lg shadow-red-200">
                                    <i class="fas fa-times mr-2"></i> Rechazar
                                </button>
                            </div>
                        </div>`;
                    }
                });

                contenedor.innerHTML = html || `<p class="text-center text-slate-400 font-bold p-10 bg-white rounded-3xl">Todas las solicitudes han sido procesadas.</p>`;
                cPendientes.innerText = pendientes;
                cTotal.innerText = `$${totalAprobado}`;
            });
        }

        // 2. FUNCIÓN PARA CAMBIAR EL ESTADO (APROBAR/RECHAZAR)
        async function gestionarPago(docId, nuevoEstado) {
            const confirmacion = confirm(`¿Estás seguro de cambiar el estado a ${nuevoEstado.toUpperCase()}?`);
            if (!confirmacion) return;

            try {
                await db.collection("deposits").doc(docId).update({
                    status: nuevoEstado
                });
                alert("✅ Estado actualizado con éxito.");
            } catch (error) {
                console.error("Error al actualizar:", error);
                alert("❌ Error: " + error.message);
            }
        }

        // Iniciar la escucha
        escucharDepositos();

    </script>
</body>
</html>
