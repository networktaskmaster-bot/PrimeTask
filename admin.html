<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | TaskMaster Global</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .card-pago { background: #1e293b; border-radius: 2rem; border: 1px solid #334155; transition: 0.3s; }
        .btn-action { transition: all 0.2s; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        .btn-action:active { transform: scale(0.95); }
        /* Ocultar scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <nav class="glass sticky top-0 z-50 p-5 rounded-b-[2.5rem] mb-6">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <i class="fas fa-crown"></i>
                </div>
                <div>
                    <h2 class="text-lg font-black tracking-tight">ADMIN <span class="text-blue-500">PRO</span></h2>
                    <p id="admin-status" class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Sincronizando...</p>
                </div>
            </div>
            <div class="flex gap-2">
                <a href="dashboard.html" class="w-10 h-10 glass rounded-xl flex items-center justify-center"><i class="fas fa-home text-sm"></i></a>
                <button onclick="logout()" class="w-10 h-10 bg-red-500/20 text-red-500 rounded-xl flex items-center justify-center"><i class="fas fa-power-off text-sm"></i></button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="glass p-5 rounded-[2rem]">
                <p class="text-[9px] font-black text-blue-400 uppercase">Pendientes</p>
                <p id="stat-pending" class="text-2xl font-black mt-1">0</p>
            </div>
            <div class="glass p-5 rounded-[2rem]">
                <p class="text-[9px] font-black text-green-400 uppercase">Aprobados</p>
                <p id="stat-approved" class="text-2xl font-black mt-1">0</p>
            </div>
            <div class="glass p-5 rounded-[2rem] col-span-2 border-l-4 border-blue-500">
                <p class="text-[9px] font-black text-slate-400 uppercase">Capital Total Validado</p>
                <p id="stat-money" class="text-2xl font-black text-blue-500 mt-1">$0.00</p>
            </div>
        </div>

        <div class="flex gap-3 overflow-x-auto no-scrollbar mb-8">
            <button onclick="toggleSection('depositos')" class="bg-blue-600 px-6 py-3 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap">Depósitos</button>
            <button onclick="toggleSection('usuarios')" class="glass px-6 py-3 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap opacity-50">Usuarios</button>
            <button onclick="window.location.href='soporte-admin.html'" class="glass px-6 py-3 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap opacity-50">Soporte</button>
        </div>

        <div id="depositos-section" class="space-y-6">
            <h3 class="text-sm font-black uppercase tracking-widest text-slate-500 mb-4 px-2">Solicitudes de Entrada</h3>
            <div id="lista-peticiones" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </div>

    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAl8xcRhkgE3lI05ShqQRMH0fxx7eNJMEk",
            authDomain: "tasks-app-80289.firebaseapp.com",
            projectId: "tasks-app-80289",
            storageBucket: "tasks-app-80289.firebasestorage.app",
            messagingSenderId: "135500027421",
            appId: "1:135500027421:web:8ccb011b5af1f483df58f4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // 1. VERIFICACIÓN DE SEGURIDAD Y ROL
        auth.onAuthStateChanged(user => {
            if(!user) window.location.href = "index.html";
            else {
                // Verificar si es Admin en la colección 'users'
                db.collection("users").doc(user.uid).get().then(doc => {
                    if(doc.exists && doc.data().role === "admin") {
                        document.getElementById('admin-status').innerText = "Acceso Autorizado";
                        cargarSistemaAgresivo();
                    } else {
                        alert("Acceso denegado: No eres administrador");
                        window.location.href = "dashboard.html";
                    }
                });
            }
        });

        // 2. LECTURA AGRESIVA DE DATOS
        function cargarSistemaAgresivo() {
            // Escuchamos TODO sin filtros iniciales para evitar que Firebase ignore datos
            db.collection("deposits").orderBy("timestamp", "desc").onSnapshot(snapshot => {
                const lista = document.getElementById('lista-peticiones');
                let html = "";
                let p = 0, a = 0, money = 0;

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const id = doc.id;

                    // Conteo para estadísticas
                    if(data.status === "pending" || data.status === "En revisión") p++;
                    if(data.status === "approved") { a++; money += Number(data.amount); }

                    // Renderizar solo pendientes o en revisión en la lista principal
                    if(data.status === "pending" || data.status === "En revisión") {
                        html += `
                        <div class="card-pago p-6 shadow-2xl">
                            <div class="flex justify-between items-start mb-5">
                                <span class="bg-yellow-500/10 text-yellow-500 text-[9px] font-black px-3 py-1 rounded-full uppercase italic tracking-widest border border-yellow-500/20">Pendiente</span>
                                <p class="text-[10px] font-bold text-slate-500">${data.timestamp ? new Date(data.timestamp.toDate()).toLocaleString() : 'Reciente'}</p>
                            </div>

                            <div class="mb-6">
                                <p class="text-[9px] font-black text-slate-500 uppercase">Monto a Validar</p>
                                <h4 class="text-3xl font-black text-white">$${data.amount} <span class="text-xs text-blue-500">MXN</span></h4>
                            </div>

                            <div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5 mb-6">
                                <p class="text-[9px] font-black text-slate-500 uppercase mb-2">Evidencia del Pago</p>
                                <a href="${data.evidence}" target="_blank" class="block group relative">
                                    <img src="${data.evidence}" class="w-full h-40 object-cover rounded-xl border border-slate-700 group-hover:opacity-50 transition">
                                    <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                                        <i class="fas fa-search-plus text-2xl"></i>
                                    </div>
                                </a>
                            </div>

                            <div class="flex gap-3">
                                <button onclick="procesar('${id}', 'approved', '${data.uid}', ${data.amount})" class="btn-action flex-1 bg-blue-600 py-4 rounded-2xl text-[10px] text-white shadow-lg shadow-blue-600/20">Aprobar</button>
                                <button onclick="procesar('${id}', 'rejected')" class="btn-action flex-1 bg-red-500/10 text-red-500 border border-red-500/20 py-4 rounded-2xl text-[10px]">Rechazar</button>
                            </div>
                        </div>`;
                    }
                });

                lista.innerHTML = html || `<div class="col-span-full text-center p-10 glass rounded-[2.5rem] opacity-50">No hay solicitudes por procesar</div>`;
                document.getElementById('stat-pending').innerText = p;
                document.getElementById('stat-approved').innerText = a;
                document.getElementById('stat-money').innerText = `$${money.toLocaleString()}`;
            });
        }

        // 3. PROCESAMIENTO DE SALDOS (Lógica de Suma)
        async function procesar(docId, estado, userUid, monto) {
            if(!confirm(`¿Confirmar acción: ${estado}?`)) return;

            try {
                // Actualizar el depósito
                await db.collection("deposits").doc(docId).update({ status: estado });

                if(estado === 'approved') {
                    // SUMAR AL SALDO DEL USUARIO AGRESIVAMENTE
                    const userRef = db.collection("users").doc(userUid);
                    await db.runTransaction(async (transaction) => {
                        const userDoc = await transaction.get(userRef);
                        if (!userDoc.exists) throw "Usuario no existe";
                        
                        let nuevoSaldo = (Number(userDoc.data().balance) || 0) + Number(monto);
                        transaction.update(userRef, { balance: nuevoSaldo });
                    });
                }
                alert("Operación completada con éxito");
            } catch (e) {
                alert("Error crítico: " + e.message);
            }
        }

        function logout() {
            auth.signOut().then(() => window.location.href = "index.html");
        }
    </script>
</body>
</html>
