<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin Pro | TaskMaster Global</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .card-pago { background: #1e293b; border-radius: 2rem; border: 1px solid #334155; transition: 0.3s; }
        .tab-btn { opacity: 0.5; transition: 0.3s; }
        .tab-btn.active { opacity: 1; background: #2563eb; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        .status-suspended { border-left: 4px solid #ef4444; opacity: 0.5; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <nav class="glass sticky top-0 z-50 p-5 rounded-b-[2.5rem] mb-6">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <i class="fas fa-shield-alt text-white"></i>
                </div>
                <div>
                    <h2 class="text-lg font-black tracking-tight uppercase">Control <span class="text-blue-500">Panel</span></h2>
                    <p id="admin-role" class="text-[8px] font-bold text-slate-400 uppercase tracking-widest italic">Verificando sesión...</p>
                </div>
            </div>
            <button onclick="auth.signOut()" class="w-10 h-10 bg-red-500/10 text-red-500 rounded-xl flex items-center justify-center hover:bg-red-500 hover:text-white transition">
                <i class="fas fa-power-off"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 text-center">
            <div class="glass p-5 rounded-[2rem] border-b-4 border-yellow-500">
                <p class="text-[9px] font-black text-slate-400 uppercase italic">Ingresos Pendientes</p>
                <p id="stat-pending" class="text-2xl font-black mt-1">0</p>
            </div>
            <div class="glass p-5 rounded-[2rem] border-b-4 border-red-500">
                <p class="text-[9px] font-black text-slate-400 uppercase italic">Retiros x Pagar</p>
                <p id="stat-withdrawals" class="text-2xl font-black mt-1">0</p>
            </div>
            <div class="glass p-5 rounded-[2rem] col-span-2 border-l-4 border-blue-500">
                <p class="text-[9px] font-black text-slate-400 uppercase italic">Balance Global Validado</p>
                <p id="stat-money" class="text-2xl font-black text-blue-500 mt-1">$0.00</p>
            </div>
        </div>

        <div class="flex gap-3 overflow-x-auto no-scrollbar mb-8 p-1">
            <button onclick="showTab('depositos', this)" class="tab-btn active px-8 py-4 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap">Depósitos</button>
            <button onclick="showTab('retiros', this)" class="tab-btn glass px-8 py-4 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap">Retiros</button>
            <button onclick="showTab('usuarios', this)" class="tab-btn glass px-8 py-4 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap">Usuarios</button>
            <button onclick="showTab('soporte', this)" class="tab-btn glass px-8 py-4 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap">Soporte</button>
        </div>

        <div id="sec-depositos" class="tab-content space-y-6">
            <div id="lista-depositos" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>

        <div id="sec-retiros" class="tab-content hidden space-y-6">
            <div id="lista-retiros" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>

        <div id="sec-usuarios" class="tab-content hidden space-y-4">
            <div class="glass p-4 rounded-3xl mb-4">
                <input type="text" id="user-search" placeholder="Buscar por email de usuario..." class="w-full bg-transparent p-2 text-xs outline-none" onkeyup="buscarUsuario()">
            </div>
            <div id="lista-usuarios" class="space-y-3"></div>
        </div>

        <div id="sec-soporte" class="tab-content hidden space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass p-6 rounded-[2rem] h-[500px] overflow-y-auto no-scrollbar">
                    <h3 class="text-[10px] font-black uppercase text-blue-400 mb-4 tracking-widest">Conversaciones</h3>
                    <div id="lista-chats" class="space-y-2"></div>
                </div>
                <div id="chat-box" class="md:col-span-2 glass p-6 rounded-[2rem] h-[500px] flex flex-col opacity-50 pointer-events-none">
                    <div id="chat-header" class="border-b border-white/10 pb-4 mb-4">
                        <p class="text-xs font-black">Selecciona un chat para responder</p>
                    </div>
                    <div id="chat-messages" class="flex-1 overflow-y-auto space-y-3 mb-4 p-2 text-[11px] no-scrollbar"></div>
                    <div class="flex gap-2">
                        <input type="text" id="input-admin-msg" class="flex-1 bg-slate-800 border border-slate-700 p-4 rounded-2xl text-xs outline-none focus:border-blue-500" placeholder="Escribe un mensaje...">
                        <button onclick="enviarMensajeAdmin()" class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAl8xcRhkgE3lI05ShqQRMH0fxx7eNJMEk",
            authDomain: "tasks-app-80289.firebaseapp.com",
            projectId: "tasks-app-80289",
            storageBucket: "tasks-app-80289.firebasestorage.app",
            messagingSenderId: "135500027421",
            appId: "1:135500027421:web:8ccb011b5af1f483df58f4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUid = null;

        auth.onAuthStateChanged(user => {
            if(!user) window.location.href = "index.html";
            else {
                db.collection("users").doc(user.uid).get().then(doc => {
                    const d = doc.data();
                    if(doc.exists && (d.role === "admin" || d.role === "staff")) {
                        document.getElementById('admin-role').innerText = `Rango: ${d.role} | ${user.email}`;
                        iniciarApp();
                    } else {
                        alert("Acceso denegado.");
                        window.location.href = "dashboard.html";
                    }
                });
            }
        });

        function iniciarApp() {
            // Sincronizar Depósitos
            db.collection("deposits").orderBy("timestamp", "desc").onSnapshot(snap => {
                let html = ""; let p = 0; let m = 0;
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.status === "approved") m += Number(d.amount);
                    if(d.status === "pending" || d.status === "En revisión") {
                        p++;
                        html += `
                        <div class="card-pago p-6">
                            <img src="${d.evidence}" class="w-full h-40 object-cover rounded-2xl mb-4 cursor-pointer" onclick="window.open('${d.evidence}')">
                            <div class="flex justify-between items-end">
                                <div>
                                    <p class="text-[10px] text-slate-400 uppercase font-black">Monto</p>
                                    <h4 class="text-2xl font-black">$${d.amount}</h4>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="aprobarPago('${doc.id}', '${d.uid}', ${d.amount})" class="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Validar</button>
                                    <button onclick="rechazar('${doc.id}', 'deposits')" class="bg-red-500/20 text-red-500 px-4 py-2 rounded-xl text-xs"><i class="fas fa-times"></i></button>
                                </div>
                            </div>
                        </div>`;
                    }
                });
                document.getElementById('lista-depositos').innerHTML = html || "<p class='col-span-2 opacity-30 text-center py-10'>Sin depósitos</p>";
                document.getElementById('stat-pending').innerText = p;
                document.getElementById('stat-money').innerText = `$${m.toLocaleString()}`;
            });

            // Sincronizar Retiros
            db.collection("withdrawals").orderBy("timestamp", "desc").onSnapshot(snap => {
                let html = ""; let r = 0;
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.status !== "Completado") {
                        r++;
                        html += `
                        <div class="card-pago p-6 border-l-4 border-red-500">
                            <h4 class="text-2xl font-black text-white mb-2">$${d.amount}</h4>
                            <p class="text-[9px] text-slate-400 font-bold uppercase mb-4">${d.bank} | ${d.account} | ${d.holder}</p>
                            <button onclick="completarRetiro('${doc.id}')" class="w-full bg-red-600/20 text-red-500 py-4 rounded-xl text-[10px] font-black uppercase">Marcar como Pagado</button>
                        </div>`;
                    }
                });
                document.getElementById('lista-retiros').innerHTML = html || "<p class='col-span-2 opacity-30 text-center py-10'>Sin retiros</p>";
                document.getElementById('stat-withdrawals').innerText = r;
            });

            // Sincronizar Usuarios
            db.collection("users").onSnapshot(snap => {
                let html = "";
                snap.forEach(doc => {
                    const u = doc.data();
                    const isSusp = u.status === "suspended";
                    html += `
                    <div class="glass p-4 rounded-2xl flex justify-between items-center ${isSusp ? 'status-suspended' : ''}">
                        <div>
                            <p class="text-[10px] font-black ${isSusp ? 'text-red-500' : 'text-blue-400'} uppercase">${u.email}</p>
                            <p class="text-[9px] text-slate-500 font-bold">$${u.balance || 0} | Paso ${u.step || 1} | Rol: ${u.role || 'user'}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editarSaldo('${doc.id}', ${u.balance || 0})" class="w-8 h-8 bg-blue-600/10 text-blue-500 rounded-lg text-xs"><i class="fas fa-coins"></i></button>
                            <button onclick="toggleSuspender('${doc.id}', ${isSusp})" class="w-8 h-8 ${isSusp ? 'bg-green-500/10 text-green-500' : 'bg-yellow-500/10 text-yellow-500'} rounded-lg text-xs"><i class="fas ${isSusp ? 'fa-play' : 'fa-pause'}"></i></button>
                            <button onclick="eliminarUser('${doc.id}')" class="w-8 h-8 bg-red-500/10 text-red-500 rounded-lg text-xs"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
                });
                document.getElementById('lista-usuarios').innerHTML = html;
            });

            // Sincronizar Lista de Soporte
            db.collection("soporte").onSnapshot(snap => {
                const list = document.getElementById('lista-chats');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `
                        <div onclick="abrirChatAdmin('${doc.id}', '${d.email}')" class="bg-white/5 p-4 rounded-2xl cursor-pointer hover:bg-blue-600/20 transition border border-white/5 mb-2">
                            <p class="text-[10px] font-black uppercase">${d.email}</p>
                            <p class="text-[9px] text-slate-500 truncate">${d.lastMsg || 'Sin mensajes'}</p>
                        </div>`;
                });
            });
        }

        // --- FUNCIONES DE SOPORTE ---
        function abrirChatAdmin(uid, email) {
            currentUid = uid;
            document.getElementById('chat-box').classList.remove('opacity-50', 'pointer-events-none');
            document.getElementById('chat-header').innerHTML = `<p class="text-xs font-black text-blue-400 uppercase">Chat con: ${email}</p>`;
            
            db.collection("soporte").doc(uid).collection("mensajes").orderBy("time", "asc").onSnapshot(snap => {
                const box = document.getElementById('chat-messages');
                box.innerHTML = "";
                snap.forEach(m => {
                    const msg = m.data();
                    const isAdmin = msg.sender === "admin";
                    box.innerHTML += `
                        <div class="flex ${isAdmin ? 'justify-end' : 'justify-start'}">
                            <div class="${isAdmin ? 'bg-blue-600' : 'bg-slate-700'} px-3 py-2 rounded-2xl max-w-[80%]">
                                ${msg.text}
                            </div>
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        async function enviarMensajeAdmin() {
            const txt = document.getElementById('input-admin-msg').value;
            if(!txt || !currentUid) return;
            await db.collection("soporte").doc(currentUid).collection("mensajes").add({
                text: txt, sender: "admin", time: Date.now()
            });
            await db.collection("soporte").doc(currentUid).update({ lastMsg: txt });
            document.getElementById('input-admin-msg').value = "";
        }

        // --- ACCIONES GENERALES ---
        async function aprobarPago(id, uid, monto) {
            if(!confirm("¿Aprobar saldo?")) return;
            await db.collection("deposits").doc(id).update({ status: "approved" });
            const ref = db.collection("users").doc(uid);
            await db.runTransaction(async (t) => {
                const doc = await t.get(ref);
                t.update(ref, { balance: (doc.data().balance || 0) + Number(monto) });
            });
        }

        async function completarRetiro(id) {
            if(confirm("¿Confirmar pago realizado?")) {
                await db.collection("withdrawals").doc(id).update({ status: "Completado" });
            }
        }

        async function toggleSuspender(id, actual) {
            const st = actual ? "active" : "suspended";
            await db.collection("users").doc(id).update({ status: st });
        }

        async function eliminarUser(id) {
            if(confirm("¿Eliminar para siempre?")) await db.collection("users").doc(id).delete();
        }

        async function editarSaldo(id, actual) {
            const n = prompt("Nuevo saldo:", actual);
            if(n) await db.collection("users").doc(id).update({ balance: Number(n) });
        }

        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'glass'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.add('glass'));
            btn.classList.add('active'); btn.classList.remove('glass');
        }

        function buscarUsuario() {
            let val = document.getElementById('user-search').value.toLowerCase();
            let items = document.getElementById('lista-usuarios').children;
            for(let i of items) {
                let email = i.querySelector('p').innerText.toLowerCase();
                i.style.display = email.includes(val) ? "flex" : "none";
            }
        }
    </script>
</body>
</html>
