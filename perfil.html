<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | TaskMaster Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0f4f8; color: #1e293b; min-height: 100vh; }
        .header-gradient { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
        .vip-card { background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%); border-radius: 2.5rem; position: relative; overflow: hidden; }
        .soft-card { background: white; border-radius: 2rem; border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .menu-item { transition: all 0.3s ease; border-radius: 1.5rem; cursor: pointer; }
        
        /* ESTILOS DEL CHAT INTERNO */
        #chat-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; backdrop-filter: blur(5px); }
        .chat-container { position: absolute; bottom: 0; left: 0; right: 0; height: 80vh; background: white; border-radius: 2.5rem 2.5rem 0 0; display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 1.5rem; font-size: 13px; font-weight: 600; }
        .msg-user { align-self: flex-end; background: #2563eb; color: white; border-bottom-right-radius: 4px; }
        .msg-admin { align-self: flex-start; background: #f1f5f9; color: #1e293b; border-bottom-left-radius: 4px; }

        /* ESTILO ADICIONAL REFERIDOS */
        .referral-box { background: #f8fafc; border: 2px dashed #e2e8f0; border-radius: 1.5rem; }
    </style>
</head>
<body class="pb-36">

    <header class="header-gradient p-8 pb-32 rounded-b-[4rem] text-white text-center">
        <h1 class="text-xl font-black uppercase tracking-[0.2em] mb-6">Centro de Usuario</h1>
        <div class="flex justify-center mb-4">
            <div class="w-24 h-24 bg-white/20 backdrop-blur-md rounded-[2.5rem] flex items-center justify-center border-2 border-white/30">
                <i class="fas fa-user-tie text-4xl text-white"></i>
            </div>
        </div>
        <h2 id="profile-name" class="text-2xl font-extrabold tracking-tight">Cargando...</h2>
        <p id="profile-id" class="text-white/50 text-[10px] font-bold mt-1 uppercase tracking-widest italic">ID: ---</p>
    </header>

    <main class="px-6 -mt-20 max-w-2xl mx-auto space-y-6">
        
        <div class="vip-card p-8 text-white shadow-2xl">
            <div class="flex justify-between items-start mb-10">
                <div>
                    <p class="text-[10px] font-black uppercase tracking-widest text-blue-100 mb-1">Balance Disponible</p>
                    <p class="text-4xl font-black tracking-tighter">$<span id="profile-bal">0.00</span></p>
                </div>
                <div id="profile-lvl-badge" class="bg-white/20 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/20 text-[10px] font-black uppercase italic">
                    Nivel --
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="window.location.href='pagos.html'" class="flex-1 bg-white text-blue-600 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg active:scale-95 transition-transform">Recargar</button>
                <button onclick="window.location.href='retiros.html'" class="flex-1 bg-blue-500/30 backdrop-blur-md text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest border border-white/20 active:scale-95 transition-transform">Retirar</button>
            </div>
        </div>

        <section class="soft-card p-6">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600">
                    <i class="fas fa-share-nodes text-xs"></i>
                </div>
                <h3 class="text-sm font-black uppercase tracking-widest text-slate-800">Programa de Socios</h3>
            </div>

            <div class="referral-box p-4 mb-4 text-center">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-2">Tu Código Único</p>
                <p id="display-ref-code" class="text-lg font-black text-blue-600 tracking-widest">CARGANDO...</p>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-center">
                    <p class="text-[8px] font-bold text-slate-400 uppercase">Invitados</p>
                    <p id="count-ref" class="text-sm font-black text-slate-800">0</p>
                </div>
                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-center">
                    <p class="text-[8px] font-bold text-slate-400 uppercase">Comisión 5%</p>
                    <p id="comm-ref" class="text-sm font-black text-green-600">Activa</p>
                </div>
            </div>

            <button onclick="window.location.href='referidos.html'" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-blue-600 transition-colors">
                Ver mi Red de Negocios <i class="fas fa-arrow-right text-[10px]"></i>
            </button>
        </section>

        <section class="soft-card p-4 space-y-2">
            <div onclick="abrirChat()" class="menu-item p-4 flex items-center justify-between group bg-blue-50/50">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white">
                        <i class="fas fa-comments text-sm"></i>
                    </div>
                    <div>
                        <span class="text-sm font-bold text-slate-700 block">Soporte Interno</span>
                        <span class="text-[9px] text-blue-500 font-bold uppercase">Chat en vivo con Admin</span>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
            </div>

            <div onclick="logout()" class="menu-item p-4 flex items-center justify-between group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-red-50 rounded-xl flex items-center justify-center text-red-500">
                        <i class="fas fa-sign-out-alt text-sm"></i>
                    </div>
                    <span class="text-sm font-bold text-red-600">Cerrar Sesión</span>
                </div>
            </div>
        </section>
    </main>

    <div id="chat-modal">
        <div class="chat-container">
            <div class="p-6 border-b flex justify-between items-center">
                <div>
                    <h3 class="font-black text-slate-800 uppercase text-sm">Soporte TaskMaster</h3>
                    <p class="text-[10px] text-green-500 font-bold">● Agente en línea</p>
                </div>
                <button onclick="cerrarChat()" class="text-slate-400 p-2"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <div id="chat-box" class="chat-messages"></div>

            <div class="p-6 border-t flex gap-2 items-center">
                <input type="text" id="chat-input" placeholder="Escribe tu mensaje..." class="flex-1 bg-slate-100 border-none rounded-2xl px-5 py-4 text-sm font-semibold focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="enviarMensaje()" class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-8 inset-x-6 z-50">
        <div class="max-w-md mx-auto bg-white/90 backdrop-blur-2xl rounded-[2.5rem] p-4 flex justify-around items-center border border-white shadow-2xl">
            <a href="dashboard.html" class="text-slate-400 flex flex-col items-center gap-1"><i class="fas fa-compass text-xl"></i><span class="text-[8px] font-black uppercase">Misiones</span></a>
            <a href="pagos.html" class="bg-blue-600 w-14 h-14 rounded-2xl flex items-center justify-center -translate-y-10 shadow-xl border-4 border-white rotate-45"><i class="fas fa-plus text-white -rotate-45 text-lg"></i></a>
            <a href="perfil.html" class="text-blue-600 flex flex-col items-center gap-1"><i class="fas fa-user-circle text-xl"></i><span class="text-[8px] font-black uppercase">Mi Perfil</span></a>
        </div>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAl8xcRhkgE3lI05ShqQRMH0fxx7eNJMEk",
            authDomain: "tasks-app-80289.firebaseapp.com",
            projectId: "tasks-app-80289",
            storageBucket: "tasks-app-80289.firebasestorage.app",
            messagingSenderId: "135500027421",
            appId: "1:135500027421:web:8ccb011b5af1f483df58f4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUid = null;

        auth.onAuthStateChanged(user => {
            if(!user) window.location.href = "index.html";
            else {
                currentUid = user.uid;
                cargarDatosPerfil(user.uid);
                escucharMensajes(user.uid);
                cargarReferidos(user.uid);
            }
        });

        function cargarDatosPerfil(uid) {
            db.collection("users").doc(uid).onSnapshot(doc => {
                if(doc.exists) {
                    const data = doc.data();
                    document.getElementById('profile-name').innerText = data.username || "Usuario";
                    document.getElementById('profile-id').innerText = `ID: ${uid.substring(0, 8).toUpperCase()}`;
                    document.getElementById('profile-bal').innerText = (data.balance || 0).toLocaleString('es-MX', { minimumFractionDigits: 2 });
                    document.getElementById('profile-lvl-badge').innerText = `Nivel VIP ${data.level || 1}`;
                    document.getElementById('display-ref-code').innerText = data.referralCode || "SIN CÓDIGO";
                }
            });
        }

        // --- NUEVA LÓGICA DE REFERIDOS ---
        function cargarReferidos(uid) {
            db.collection("users").where("padrino", "==", uid).onSnapshot(snap => {
                document.getElementById('count-ref').innerText = snap.size;
            });
        }

        // --- LÓGICA DEL CHAT ---
        function abrirChat() { document.getElementById('chat-modal').style.display = 'block'; scrollChat(); }
        function cerrarChat() { document.getElementById('chat-modal').style.display = 'none'; }

        function escucharMensajes(uid) {
            db.collection("soporte").doc(uid).collection("mensajes")
              .orderBy("fecha", "asc")
              .onSnapshot(snapshot => {
                  const chatBox = document.getElementById('chat-box');
                  chatBox.innerHTML = "";
                  snapshot.forEach(doc => {
                      const m = doc.data();
                      const div = document.createElement('div');
                      div.className = `msg ${m.sender === 'user' ? 'msg-user' : 'msg-admin'}`;
                      div.innerText = m.texto;
                      chatBox.appendChild(div);
                  });
                  scrollChat();
              });
        }

        async function enviarMensaje() {
            const input = document.getElementById('chat-input');
            const texto = input.value.trim();
            if(!texto) return;

            input.value = "";
            await db.collection("soporte").doc(currentUid).collection("mensajes").add({
                texto: texto,
                sender: 'user',
                fecha: firebase.firestore.FieldValue.serverTimestamp()
            });
            await db.collection("soporte").doc(currentUid).set({ 
                lastUpdate: firebase.firestore.FieldValue.serverTimestamp(),
                unread: true,
                username: document.getElementById('profile-name').innerText
            }, { merge: true });
        }

        function scrollChat() {
            const chatBox = document.getElementById('chat-box');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function logout() { auth.signOut().then(() => window.location.href = "index.html"); }
    </script>
</body>
</html>
